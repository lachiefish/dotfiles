## CROSS-SHELL PROMPT
##
## rxyhn's starship configuration
## The minimal, blazing-fast, and infinitely customizable prompt for any shell!
"$schema" = 'https://starship.rs/config-schema.json'

format = "$all $fill $git_branch$git_status$battery$time$cmd_duration$directory\n$os$character"

# Disable the blank line at the start of the prompt
add_newline = true

[fill]
symbol = " "

[line_break]
disabled = true

[character]
success_symbol = "[оҠ…](#6791c9)"
error_symbol = "[оҠ…](#df5b61)"
vicmd_symbol = "[ оҳ« ](#78b892)"

[os]
disabled = false

[time]
disabled = false
use_12hr = true
time_format = "%-I:%M"
format = "[оӮ¶](fg:#232526 bg:none)[$time]($style)[оӮҙ](fg:#232526 bg:#232526)[оӮ¶](fg:#ffb86c bg:#232526)[уұ‘Ӯ](fg:#232526 bg:#ffb86c)[оӮҙ](fg:#ffb86c bg:none) "
style = "fg:#edeff0 bg:#232526"

[battery]
full_symbol = "уұҲҸ"
charging_symbol = "у°Ӯ„"
discharging_symbol = "пғ§"
format = "[оӮ¶](fg:#232526 bg:none)[$symbol$percentage]($style)[оӮҙ](fg:#232526 bg:none) "

[[battery.display]]
threshold = 100
style = "fg:#50fa7b bg:#232526"

[[battery.display]]
threshold = 60
style = "fg:#8be9fd bg:#232526"

[[battery.display]]
threshold = 30
style = "fg:#ff5555 bg:#232526"

[username]
format = "[$user](bold blue) "
disabled = false
show_always = true

[hostname]
ssh_only = true
format = "on [$hostname](bold green) "
disabled = false
ssh_symbol = ' п’ү '

[cmd_duration]
min_time = 1
format = "[оӮ¶](fg:#232526 bg:none)[$duration]($style)[оӮҙ](fg:#232526 bg:#232526)[оӮ¶](fg:#bc83e3 bg:#232526)[пү’](fg:#232526 bg:#bc83e3)[оӮҙ](fg:#bc83e3 bg:none) "
disabled = false
style = "fg:#edeff0 bg:#232526"

[directory]
format = "[оӮ¶](fg:#232526 bg:none)[$path]($style)[оӮҙ](fg:#232526 bg:#232526)[оӮ¶](fg:#6791c9 bg:#232526)[пҒ»](fg:#232526 bg:#6791c9)[оӮҙ](fg:#6791c9 bg:none) "
style = "fg:#edeff0 bg:#232526"
truncation_length = 3
truncate_to_repo=false
read_only = " п Ҫ"

[git_branch]
format = "[оӮ¶](fg:#232526 bg:none)[$branch]($style)[оӮҙ](fg:#232526 bg:#232526)[оӮ¶](fg:#78b892 bg:#232526)[пҗҳ](fg:#282c34 bg:#78b892)[оӮҙ](fg:#78b892 bg:none) "
style = "fg:#edeff0 bg:#232526"
symbol = "пҗҳ "

[git_status]
format="[оӮ¶](fg:#232526 bg:none)[$all_status$ahead_behind]($style)[оӮҙ](fg:#232526 bg:#232526)[оӮ¶](fg:#67afc1 bg:#232526)[оңҲ](fg:#232526 bg:#67afc1)[оӮҙ](fg:#67afc1 bg:none) "
style = "fg:#edeff0 bg:#232526"
conflicted = "="
ahead =	"вҮЎ${count}"
behind = "вҮЈ${count}"
diverged = "вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}"
up_to_date = "пҳ«"
untracked = "?${count}"
stashed = "пЈ•"
modified = "!${count}"
staged = "+${count}"
renamed = "В»${count}"
deleted = "пҷ•${count}"

[git_commit]
format = "[\\($hash\\)]($style) [\\($tag\\)]($style) "
style = "green"

[git_state]
rebase = "REBASING"
merge =	"MERGING"
revert = "REVERTING"
cherry_pick = "CHERRY-PICKING"
bisect = "BISECTING"
am = "AM"
am_or_rebase = "AM/REBASE"
style =	"yellow"
format = '\([$state( $progress_current/$progress_total)]($style)\) '

